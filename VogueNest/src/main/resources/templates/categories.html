<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VogueNest - Premium Categories</title>
    <!-- Premium Google Fonts for Luxury Brand Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: #fbfaf8; /* Soft warm luxury backdrop */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Pastel Background Blobs  */
        .pastel-blob-1 {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(74, 124, 102, 0.08) 0%, rgba(255,255,255,0) 70%); /* Soft Sage Green */
            top: -15%;
            left: -10%;
            z-index: 0;
            pointer-events: none;
        }

        .pastel-blob-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(235, 217, 211, 0.15) 0%, rgba(255,255,255,0) 70%); /* Soft Blush Peach */
            bottom: -10%;
            right: -5%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            width: 100%;
            text-align: center;
        }

        /* Header */
        .brand-subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7a8a82;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #1e2a22; /* Rich dark olive-charcoal */
            font-weight: 500;
            margin-bottom: 60px;
            position: relative;
        }

        .page-title span {
            font-style: italic;
            color: #4a7c66; /* Elegant Sage Green Accent from landing page */
        }

        /* Category Grid  */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 24px;
            width: 100%;
            padding: 0 20px;
        }

        @media (max-width: 1200px) {
            .category-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 30px;
            }
        }

        @media (max-width: 768px) {
            .category-grid {
                grid-template-columns: repeat(1, 1fr);
                max-width: 400px;
                margin: 0 auto;
            }
        }

        /* Luxury Cards */
        .category-card {
            background: transparent;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            text-align: left;
            transition: all 0.5s ease;
        }

        /* Image Wrapper with hidden overflow for zoom effect */
        .image-wrapper {
            position: relative;
            width: 100%;
            height: 380px; /* Perfect elegant vertical aspect ratio */
            overflow: hidden;
            border-radius: 4px; /* Slight roundness for a soft clean finish */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.5s ease;
        }

        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Card Text Information */
        .card-info {
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid transparent;
            transition: border-color 0.4s ease;
        }

        .category-number {
            font-size: 0.8rem;
            color: #a0b0a6;
            margin-bottom: 6px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .category-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            color: #1e2a22;
            font-weight: 500;
            margin-bottom: 4px;
            transition: color 0.3s ease;
        }

        .category-action {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7a8a82;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .category-action::after {
            content: '→';
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        /*Hovering */
        .category-card:hover .image-wrapper {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(74, 124, 102, 0.1);
        }

        .category-card:hover img {
            transform: scale(1.06); /* Ultra-smooth magnification */
        }

        .category-card:hover .category-name {
            color: #4a7c66; /* Changes text to matches brand green */
        }

        .category-card:hover .category-action {
            color: #1e2a22;
            opacity: 1;
        }

        .category-card:hover .category-action::after {
            transform: translateX(6px);
        }
    </style>
</head>
<body>

<!-- Pastel Orbs -->
<div class="pastel-blob-1"></div>
<div class="pastel-blob-2"></div>

<div class="container">
    <!--Header -->
    <p class="brand-subtitle">VogueNest Curated</p>
    <h1 class="page-title">Shop by <span>Category</span></h1>

    <!--Grid -->
    <div class="category-grid">

        <!Dresses -->
        <a href="/shop?category=dresses" class="category-card">
            <div class="image-wrapper">
                <img src="/images/catdresses.jpg" alt="Dresses Collection">
            </div>
            <div class="card-info">
                <span class="category-number">01 / COLLECTION</span>
                <h3 class="category-name">Dresses</h3>
                <span class="category-action">Explore</span>
            </div>
        </a>

        <!--Footwear -->
        <a href="/shop?category=footwear" class="category-card">
            <div class="image-wrapper">
                <img src="/images/catfootwear.jpeg" alt="Footwear Collection">
            </div>
            <div class="card-info">
                <span class="category-number">02 / LOOKBOOK</span>
                <h3 class="category-name">Footwear</h3>
                <span class="category-action">Explore</span>
            </div>
        </a>

        <!--Accessories -->
        <a href="/shop?category=accessories" class="category-card">
            <div class="image-wrapper">
                <img src="/images/cataccessories.jpg" alt="Accessories Collection">
            </div>
            <div class="card-info">
                <span class="category-number">03 / FINISHING TOUCHES</span>
                <h3 class="category-name">Accessories</h3>
                <span class="category-action">Explore</span>
            </div>
        </a>

        <!--Makeup -->
        <a href="/shop?category=makeup" class="category-card">
            <div class="image-wrapper">
                <img src="/images/catmakeup.jpg" alt="Makeup Essentials">
            </div>
            <div class="card-info">
                <span class="category-number">04 / ESSENTIALS</span>
                <h3 class="category-name">Makeup</h3>
                <span class="category-action">Explore</span>
            </div>
        </a>

        <!--Skincare -->
        <a href="/shop?category=skincare" class="category-card">
            <div class="image-wrapper">
                <img src="/images/catskincare.jpg" alt="Skincare Rituals">
            </div>
            <div class="card-info">
                <span class="category-number">05 / SKINCARE RITUALS</span>
                <h3 class="category-name">Skincare</h3>
                <span class="category-action">Explore</span>
            </div>
        </a>

    </div>
</div>

</body>
</html>
