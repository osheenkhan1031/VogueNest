<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VogueNest - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vogueGold: '#D4AF37',
                        vogueDark: '#1A1A1A',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .heading-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#121212] text-white min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8 overflow-hidden relative">

<!-- Background image -->
<div class="absolute inset-0 z-0 opacity-40 lg:opacity-50">
    <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796?auto=format&fit=crop&w=1920&q=80"
         alt="VogueNest Editorial Background"
         class="w-full h-full object-cover filter brightness-75 contrast-125 saturate-75">
    <div class="absolute inset-0 bg-gradient-to-t from-[#121212] via-transparent to-[#121212] lg:bg-gradient-to-r lg:from-transparent lg:to-[#121212]"></div>
</div>

<!-- Watermark -->
<div class="absolute pointer-events-none select-none z-10 opacity-[0.03] text-[12vw] font-bold tracking-widest heading-serif uppercase">
    VogueNest
</div>

<!-- Signup Container -->
<div class="w-full max-w-md bg-vogueDark/80 backdrop-blur-xl border border-white/10 p-8 rounded-2xl shadow-2xl z-20 relative overflow-hidden">

    <!-- Header-->
    <div class="text-center mb-6">
        <h1 class="heading-serif text-3xl font-light tracking-widest text-vogueGold uppercase">
            Vogue<span class="font-normal text-white">Nest</span>
        </h1>
        <p class="text-xs text-stone-400 mt-2 uppercase tracking-widest">Join the premium fashion community</p>
    </div>

    <!--Form-->
    <form action="/signup" method="POST" class="space-y-4 relative z-10">

        <!-- Full Name -->
        <div>
            <label for="fullName" class="block text-xs uppercase tracking-wider text-stone-300 mb-1.5 font-medium">Full Name</label>
            <input type="text" id="fullName" name="fullName" required
                   class="w-full bg-white/[0.03] border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white placeholder-stone-600 focus:outline-none focus:border-vogueGold focus:ring-1 focus:ring-vogueGold transition duration-300"
                   placeholder="Alex Morgan">
        </div>

        <!-- Email id-->
        <div>
            <label for="email" class="block text-xs uppercase tracking-wider text-stone-300 mb-1.5 font-medium">Email Address</label>
            <input type="email" id="email" name="email" required
                   class="w-full bg-white/[0.03] border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white placeholder-stone-600 focus:outline-none focus:border-vogueGold focus:ring-1 focus:ring-vogueGold transition duration-300"
                   placeholder="alex@example.com">
        </div>

        <!-- Enter Password -->
        <div>
            <label for="password" class="block text-xs uppercase tracking-wider text-stone-300 mb-1.5 font-medium">Password</label>
            <input type="password" id="password" name="password" required
                   class="w-full bg-white/[0.03] border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white placeholder-stone-600 focus:outline-none focus:border-vogueGold focus:ring-1 focus:ring-vogueGold transition duration-300"
                   placeholder="Create a strong password">
        </div>

        <!-- Terms checkbox -->
        <div class="flex items-start pt-2">
            <input type="checkbox" id="terms" name="terms" required
                   class="mt-0.5 h-4 w-4 rounded bg-stone-900 border-white/10 text-vogueGold focus:ring-vogueGold accent-vogueGold">
            <label for="terms" class="ml-2 block text-xs text-stone-400 select-none leading-tight">
                I agree to the <a href="#" class="text-vogueGold hover:underline">Terms of Service</a> and <a href="#" class="text-vogueGold hover:underline">Privacy Policy</a>.
            </label>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full bg-vogueGold hover:bg-yellow-600 text-vogueDark font-semibold text-sm uppercase tracking-widest py-3 rounded-lg transition duration-300 transform active:scale-[0.98] shadow-lg shadow-vogueGold/10 mt-4">
            Create Account
        </button>
    </form>

    <!-- Footer Links -->
    <div class="mt-6 pt-5 border-t border-white/5 text-center text-xs text-stone-400">
        <p>Already have an account? <a href="/login" class="text-vogueGold hover:underline font-medium tracking-wide">Log in instead</a></p>
    </div>
</div>

</body>
</html>
