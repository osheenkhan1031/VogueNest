<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Catalog | VogueNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: {
                        pastelCream: '#FDFBF7', pastelWarm: '#F5ECE1', pastelCharcoal: '#1E2321',
                        pastelSage: '#4A6154', pastelRose: '#E09295'
                    }}}}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; } .heading-serif { font-family: 'Playfair Display', serif; }</style>
</head>
<body class="bg-pastelCream min-h-screen p-6 md:p-12">

<!-- Header Section -->
<div class="max-w-4xl mx-auto mb-10 text-center">
    <h1 class="heading-serif text-4xl text-pastelSage uppercase tracking-widest font-light">Product Catalog</h1>
    <p class="text-[9px] text-pastelCharcoal/60 mt-2 uppercase tracking-[0.25em] font-extrabold">Authorized Inventory Management</p>
</div>

<!-- Product Table Container -->
<div class="max-w-4xl mx-auto bg-white/50 backdrop-blur-sm border border-white shadow-xl rounded-3xl overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead class="bg-pastelSage/5">
        <tr>
            <th class="p-6 text-[10px] uppercase tracking-widest text-pastelCharcoal/70">Product Name</th>
            <th class="p-6 text-[10px] uppercase tracking-widest text-pastelCharcoal/70">Price</th>
            <th class="p-6 text-[10px] uppercase tracking-widest text-pastelCharcoal/70 text-right">Actions</th>
        </tr>
        </thead>
        <tbody>
        <!-- Loop Start -->
        <tr th:each="p : ${allProducts}" class="border-b border-pastelWarm hover:bg-pastelWarm/30 transition">
            <td class="p-6 text-sm font-medium text-pastelCharcoal" th:text="${p.name}">Product Name</td>
            <td class="p-6 text-sm text-pastelCharcoal/70" th:text="'$' + ${p.price}">Price</td>
            <td class="p-6 text-right">
                <a th:href="@{/admin/edit/{id}(id=${p.id})}"
                   class="bg-pastelSage text-white px-5 py-2 rounded-xl text-[9px] uppercase tracking-widest font-bold hover:bg-pastelSage/90 transition shadow-sm">
                    Edit Details
                </a>
            </td>
        </tr>
        <!-- Loop End -->
        </tbody>
    </table>

    <!-- Empty State (Optional) -->
    <div th:if="${#lists.isEmpty(allProducts)}" class="p-10 text-center text-pastelCharcoal/50">
        No products found in catalog.
    </div>
</div>

<!-- Navigation Footer -->
<div class="max-w-4xl mx-auto mt-10 text-center">
    <a href="/admin/add" class="text-pastelRose font-bold uppercase tracking-widest text-[9px] underline underline-offset-4 hover:text-pastelTerracotta transition">
        &larr; Back to Add Product
    </a>
</div>

</body>
</html>
