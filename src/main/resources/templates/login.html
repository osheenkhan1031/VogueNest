<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | VogueNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastelCream: '#FDFBF7',     /* Cozy Linen background */
                        pastelWarm: '#F5ECE1',      /* Rich warm sand background split */
                        pastelBlush: '#FAF0EB',     /* Soft premium aesthetic blush pink */
                        pastelCharcoal: '#1E2321',  /* Premium soft high-contrast dark text */
                        pastelSage: '#4A6154',      /* Muted, deep organic forest sage green */
                        pastelRose: '#E09295',      /* Rich warm aesthetic rose pink */
                        pastelGold: '#DDA15E',      /* Vibrant earth gold */
                        pastelTerracotta: '#C96A53',/* Bright terracotta coral accent */
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .heading-serif { font-family: 'Playfair Display', serif; }

        /*  watermark  */
        @keyframes luxury-sage-pulse {
            0%, 100% {
                opacity: 0.12;
                transform: scale(1) translate(-50%, -50%);
                text-shadow: 0 0 25px rgba(74, 97, 84, 0);
            }
            50% {
                opacity: 0.32;
                transform: scale(1.04) translate(-50%, -50%);
                text-shadow: 0 0 45px rgba(74, 97, 84, 0.5);
            }
        }
        .animate-sage-pulse {
            animation: luxury-sage-pulse 7s ease-in-out infinite;
        }
    </style>
</head>
<!-- Background-->
<body class="bg-cover bg-center min-h-screen relative flex items-center justify-center p-6 overflow-x-hidden"
      style="background-image: url('https://images.unsplash.com/photo-1596462502278-27bfdc403348?q=80&w=2000&auto=format&fit=crop');">


<div class="absolute inset-0 bg-pastelCharcoal/30 z-0"></div>

<!-- The Pulsating VOGUENEST Watermark-->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 select-none pointer-events-none z-10 animate-sage-pulse text-center w-full">
    <h1 class="heading-serif text-[11vw] font-black tracking-[0.25em] text-pastelSage">VOGUENEST</h1>
</div>

<!-- Main Frosted  Glass Card Container -->
<div class="w-full max-w-md bg-pastelCream/92 backdrop-blur-md border border-white/60 p-10 rounded-3xl shadow-2xl relative z-20 space-y-6 text-pastelCharcoal">

    <div class="text-center space-y-2">
        <a href="/" class="heading-serif text-3xl font-light tracking-widest text-pastelSage uppercase inline-block">
            Vogue<span class="text-pastelCharcoal font-normal">Nest</span>
        </a>
        <p class="text-[9px] text-pastelCharcoal/60 uppercase tracking-[0.25em] font-extrabold">Welcome back to Curated Living</p>
    </div>

    <!-- Error Notification Box -->
    <div th:if="${error}" class="p-3.5 bg-pastelTerracotta/10 border border-pastelTerracotta/20 text-pastelTerracotta text-[10px] uppercase tracking-wider text-center rounded-xl font-bold">
        <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span th:text="${error}">Invalid email or password!</span>
    </div>

    <!-- Success Notification Box -->
    <div th:if="${success}" class="p-3.5 bg-pastelSage/10 border border-pastelSage/20 text-pastelSage text-[10px] uppercase tracking-wider text-center rounded-xl font-bold">
        <i class="fa-solid fa-circle-check mr-1"></i> <span th:text="${success}">Registration complete! Please log in.</span>
    </div>


    <form th:action="@{/auth/login}" method="POST" id="loginForm" class="space-y-4" onsubmit="prepareGuestCartForSync()">


        <input type="hidden" name="guestCartJson" id="guestCartJson" value="">

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Email Address</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-pastelCharcoal/30">
                    <i class="fa-regular fa-envelope text-xs"></i>
                </span>
                <input type="email" name="email" required placeholder="abc@voguenest.com"
                       class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl pl-10 pr-4 py-3 text-sm text-pastelCharcoal focus:border-pastelSage focus:ring-1 focus:ring-pastelSage focus:outline-none transition duration-300 placeholder-pastelCharcoal/30">
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-1.5">
                <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold">Security Password</label>
                <a href="#" class="text-[8px] uppercase tracking-wider text-pastelTerracotta hover:underline font-bold">Forgot?</a>
            </div>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-pastelCharcoal/30">
                    <i class="fa-solid fa-lock text-xs"></i>
                </span>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl pl-10 pr-4 py-3 text-sm text-pastelCharcoal focus:border-pastelSage focus:ring-1 focus:ring-pastelSage focus:outline-none transition duration-300 placeholder-pastelCharcoal/30">
            </div>
        </div>

        <div class="pt-2">
            <button type="submit" class="w-full bg-pastelSage hover:bg-pastelSage/90 text-white font-bold py-3.5 rounded-xl uppercase tracking-widest text-[9px] transition duration-300 shadow-md shadow-pastelSage/10">
                Log In Securely
            </button>
        </div>
    </form>

    <div class="border-t border-pastelWarm/60 pt-6 text-center text-[10px] tracking-wider text-pastelCharcoal/50 font-semibold">
        Not a member yet?
        <a href="/signup" class="text-pastelSage hover:text-pastelTerracotta font-bold ml-1 transition-colors duration-300 uppercase tracking-widest">
            Join Membership
        </a>
    </div>
</div>

<script>
    function prepareGuestCartForSync() {
        const guestCart = localStorage.getItem('vogue_cart');
        if (guestCart) {
            document.getElementById('guestCartJson').value = guestCart;
        }
    }
</script>

</body>
</html>
