<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Product | VogueNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config =
            {
                theme:
                    {
                        extend:
                            {
                                colors:
                                    {
                                        pastelCream: '#FDFBF7',
                                        pastelWarm: '#F5ECE1',
                                        pastelCharcoal: '#1E2321',
                                        pastelSage: '#4A6154',
                                        pastelTerracotta: '#C96A53'
                    }
                            }
                    }
            }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; } .heading-serif { font-family: 'Playfair Display', serif; }</style>
</head>
<body class="bg-cover bg-center min-h-screen flex items-center justify-center p-6"
      style="background-image: url('https://images.unsplash.com/photo-1558882224-cca166733360?q=80&w=2000&auto=format&fit=crop');">

<div class="absolute inset-0 bg-pastelCharcoal/25"></div>

<div class="w-full max-w-lg bg-pastelCream/92 backdrop-blur-md border border-white/60 p-10 rounded-3xl shadow-2xl relative z-20 space-y-6 text-pastelCharcoal">

    <div class="text-center">
        <h1 class="heading-serif text-3xl font-light tracking-widest text-pastelSage uppercase">Edit <span class="text-pastelCharcoal font-normal">Product</span></h1>
        <p class="text-[9px] text-pastelCharcoal/60 mt-2 uppercase tracking-[0.25em] font-extrabold">Modification Portal</p>
    </div>

    <form th:action="@{/admin/update}" th:object="${product}" method="POST" class="space-y-4">
        <input type="hidden" th:field="*{id}" />

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Product Name</label>
            <input type="text" th:field="*{name}" required class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl px-4 py-3 text-sm focus:border-pastelSage focus:ring-1 focus:ring-pastelSage outline-none transition">
        </div>

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Category</label>
            <select th:field="*{category}" required class="w-full bg-pastelCream border border-pastelWarm rounded-xl px-4 py-3 text-sm focus:border-pastelSage outline-none transition">
                <option value="dresses">Dresses</option>
                <option value="footwear">Footwear</option>
                <option value="accessories">Accessories</option>
                <option value="makeup">Makeup</option>
                <option value="skincare">Skincare</option>
            </select>
        </div>

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Retail Price ($ USD)</label>
            <input type="number" step="0.01" th:field="*{price}" required class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl px-4 py-3 text-sm focus:border-pastelSage outline-none transition">
        </div>

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Product Image URL</label>
            <input type="url" th:field="*{imageUrl}" required class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl px-4 py-3 text-sm focus:border-pastelSage outline-none transition">
        </div>

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Editorial Description</label>
            <textarea th:field="*{description}" required rows="3" class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl px-4 py-3 text-sm focus:border-pastelSage outline-none transition resize-none"></textarea>
        </div>

        <div class="flex gap-4 pt-2">
            <a href="/admin/list" class="flex-1 border border-pastelWarm hover:border-pastelTerracotta hover:text-pastelTerracotta text-pastelCharcoal/50 py-3.5 rounded-xl text-center uppercase tracking-widest text-[9px] transition font-bold">
                Cancel
            </a>
            <button type="submit" class="flex-1 bg-pastelSage hover:bg-pastelSage/90 text-white font-bold py-3.5 rounded-xl uppercase tracking-widest text-[9px] transition shadow-md">
                Update Product
            </button>
        </div>
    </form>

    <div class="mt-8 pt-6 border-t border-pastelWarm/50 text-center">
        <a th:href="@{/admin/delete/{id}(id=${product.id})}"
           onclick="return confirm('Are you sure you want to delete this product? This action cannot be undone.');"
           class="text-pastelTerracotta font-bold uppercase tracking-widest text-[9px] hover:text-pastelRose transition underline underline-offset-4">
            Delete Product Permanently
        </a>
    </div>

</div>
</body>
</html>
