<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Product | VogueNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastelCream: '#FDFBF7',     /* Cozy Linen background */
                        pastelWarm: '#F5ECE1',      /* Rich warm sand background split */
                        pastelBlush: '#FAF0EB',     /* Soft premium aesthetic blush pink */
                        pastelCharcoal: '#1E2321',  /* Premium soft high-contrast dark text */
                        pastelSage: '#4A6154',      /* Muted, deep organic forest sage green */
                        pastelRose: '#E09295',      /* Rich warm aesthetic rose pink */
                        pastelGold: '#DDA15E',      /* Vibrant earth gold */
                        pastelTerracotta: '#C96A53',/* Bright terracotta coral accent */
                    }
                }
            }
        }
    </script>
    <!-- Google Premium Web Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .heading-serif { font-family: 'Playfair Display', serif; }

        @keyframes luxury-sage-pulse {
            0%, 100% {
                opacity: 0.12;
                transform: scale(1) translate(-50%, -50%);
                text-shadow: 0 0 25px rgba(74, 97, 84, 0);
            }
            50% {
                opacity: 0.32;
                transform: scale(1.04) translate(-50%, -50%);
                text-shadow: 0 0 45px rgba(74, 97, 84, 0.5);
            }
        }
        .animate-sage-pulse {
            animation: luxury-sage-pulse 7s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-cover bg-center min-h-screen relative flex items-center justify-center p-6 overflow-x-hidden"
      style="background-image: url('https://images.unsplash.com/photo-1558882224-cca166733360?q=80&w=2000&auto=format&fit=crop');">

<div class="absolute inset-0 bg-pastelCharcoal/25 z-0"></div>

<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 select-none pointer-events-none z-10 animate-sage-pulse text-center w-full">
    <h1 class="heading-serif text-[11vw] font-black tracking-[0.25em] text-pastelSage">VOGUENEST</h1>
</div>

<div class="w-full max-w-lg bg-pastelCream/92 backdrop-blur-md border border-white/60 p-10 rounded-3xl shadow-2xl relative z-20 space-y-6 text-pastelCharcoal">

    <div class="text-center">
        <h1 class="heading-serif text-3xl font-light tracking-widest text-pastelSage uppercase">Add <span class="text-pastelCharcoal font-normal">Product</span></h1>
        <p class="text-[9px] text-pastelCharcoal/60 mt-2 uppercase tracking-[0.25em] font-extrabold">Authorized Catalog Insertion Portal</p>
    </div>

    <form th:action="@{/admin/add}" th:object="${product}" method="POST" class="space-y-4">

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Product Name</label>
            <input type="text" th:field="*{name}" required placeholder="e.g. Minimalist Silk Slip Dress"
                   class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl px-4 py-3 text-sm text-pastelCharcoal focus:border-pastelSage focus:ring-1 focus:ring-pastelSage focus:outline-none transition duration-300 placeholder-pastelCharcoal/30">
        </div>

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Category</label>
            <select th:field="*{category}" required
                    class="w-full bg-pastelCream border border-pastelWarm rounded-xl px-4 py-3 text-sm text-pastelCharcoal focus:border-pastelSage focus:ring-1 focus:ring-pastelSage focus:outline-none transition duration-300">
                <option value="dresses">Dresses</option>
                <option value="footwear">Footwear</option>
                <option value="accessories">Accessories</option>
                <option value="makeup">Makeup</option>
                <option value="skincare">Skincare</option>
            </select>
        </div>

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Retail Price ($ USD)</label>
            <input type="number" step="0.01" th:field="*{price}" required placeholder="e.g. 189.00"
                   class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl px-4 py-3 text-sm text-pastelCharcoal focus:border-pastelSage focus:ring-1 focus:ring-pastelSage focus:outline-none transition duration-300 placeholder-pastelCharcoal/30">
        </div>

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Product Image URL</label>
            <input type="url" th:field="*{imageUrl}" required placeholder="e.g. https://images.unsplash.com/photo-..."
                   class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl px-4 py-3 text-sm text-pastelCharcoal focus:border-pastelSage focus:ring-1 focus:ring-pastelSage focus:outline-none transition duration-300 placeholder-pastelCharcoal/30">
        </div>

        <div>
            <label class="block text-[9px] uppercase tracking-wider text-pastelCharcoal/60 font-bold mb-1.5">Editorial Description</label>
            <textarea th:field="*{description}" required placeholder="Write product features and quality parameters..." rows="3"
                      class="w-full bg-pastelWarm/20 border border-pastelWarm rounded-xl px-4 py-3 text-sm text-pastelCharcoal focus:border-pastelSage focus:ring-1 focus:ring-pastelSage focus:outline-none transition duration-300 placeholder-pastelCharcoal/30 resize-none"></textarea>
        </div>

        <!-- NEW: Manage Catalog Link -->
        <div class="mt-8 text-center border-t border-pastelWarm/50 pt-6">
            <a href="/admin/list"
               class="text-pastelSage font-bold uppercase tracking-[0.2em] text-[9px] hover:text-pastelSage/70 underline underline-offset-4 transition duration-300">
                View & Edit Existing Products
            </a>
        </div>

        <!-- Submission Buttons -->
        <div class="flex gap-4 pt-2">
            <a href="/shop" class="flex-1 border border-pastelWarm hover:border-pastelTerracotta hover:text-pastelTerracotta text-pastelCharcoal/50 py-3.5 rounded-xl text-center uppercase tracking-widest text-[9px] transition duration-300 font-bold">
                Cancel
            </a>
            <button type="submit" class="flex-1 bg-pastelSage hover:bg-pastelSage/90 text-white font-bold py-3.5 rounded-xl uppercase tracking-widest text-[9px] transition duration-300 shadow-md shadow-pastelSage/10">
                Save Product
            </button>
        </div>
    </form>
</div>

</body>
</html>
