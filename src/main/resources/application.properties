
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/your_local_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:your_local_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_local_pass}


spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

app.admin.email=${APP_ADMIN_EMAIL:admin@voguenest.com}